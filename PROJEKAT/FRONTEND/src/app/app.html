<div class="app-shell">
  <aside class="sidebar">
    <a class="brand-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <span class="brand-mark">T12</span>
      <span>
        <strong>Tim12</strong>
        <small>Finansije</small>
      </span>
    </a>

    @if (isAuthenticated) {
      <button type="button" class="company-switch" disabled>
        <span class="company-icon">D</span>
        <span>Kompanija</span>
        <span class="chevron">v</span>
      </button>

      <nav class="side-nav" aria-label="Glavna navigacija">
        <a routerLink="/home" routerLinkActive="active">
          <span class="nav-icon">NP</span>
          <span>Nadzorna ploča</span>
        </a>
        <a
          routerLink="/troskovi"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          [class.disabled]="!canOpenExpenses"
          (click)="openExpensesTab($event)"
        >
          <span class="nav-icon">TR</span>
          <span>Unos troškova</span>
        </a>
        <a
          routerLink="/troskovi/import"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          [class.disabled]="!canOpenExpenses"
          (click)="openExpensesTab($event)"
        >
          <span class="nav-icon">IM</span>
          <span>Import troškova</span>
        </a>
        <a
            routerLink="/budzeti"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            [class.disabled]="!canOpenBudgets"
            (click)="openBudgetsTab($event)"
          >
            <span class="nav-icon">PB</span>
            <span>Planiranje budžeta</span>
          </a>
      </nav>
    }

    @if (isAdmin) {
      <a class="sidebar-admin-link" [href]="adminConsoleUrl" target="_blank" rel="noopener noreferrer">
        <span class="nav-icon">AD</span>
        <span>Admin panel</span>
      </a>
    }
  </aside>

  <section class="workspace">
    <header class="topbar">
      @if (isAuthenticated) {
        <label class="search-box">
          <span>S</span>
          <input type="search" placeholder="Pretrazite troskove, dobavljace, kategorije..." />
        </label>
      }

      <div class="topbar-actions">
        @if (isAuthenticated) {
          <button type="button" class="filter-button" disabled>Period</button>
          <button type="button" class="filter-button" disabled>Kompanije</button>
          <button type="button" class="icon-button" disabled aria-label="Obavjestenja">!</button>
          @if (primaryRole) {
            <span class="role-badge">{{ primaryRole }}</span>
          }
          <button type="button" class="danger-button" (click)="signOut()" [disabled]="isLoading">
            Odjavi se
          </button>
        } @else {
          <button type="button" class="secondary-button" (click)="signIn()" [disabled]="isLoading">
            Prijavi se
          </button>
        }
      </div>
    </header>

    @if (navMessage) {
      <p class="nav-message">{{ navMessage }}</p>
    }

    <main>
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
