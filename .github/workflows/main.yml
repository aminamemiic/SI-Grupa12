name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd PROJEKAT/BACKEND
          npm install
      - name: Build
        run: |
          cd PROJEKAT/BACKEND
          npm run build

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd PROJEKAT/FRONTEND
          npm install
      - name: Build
        run: |
          cd PROJEKAT/FRONTEND
          npm run build -- --configuration=production
